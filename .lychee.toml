# Lychee link checker configuration
# https://lychee.cli.rs/usage/config/

# Exclude patterns
exclude = [
  # API endpoints (not documentation)
  "https://api\\.anthropic\\.com",
  "https://api\\.openai\\.com",
  # docs.rs links may 404/429 until crate is published and indexed
  "https://docs\\.rs/neuron",
  # External sites that are intermittently unreachable from CI
  "https://www\\.conventionalcommits\\.org",
]

# Exclude build artifacts and dependency docs
exclude_path = ["target"]

# Retry transient failures
max_retries = 3

# GitHub rate-limits and blocks unauthenticated requests;
# CI passes GITHUB_TOKEN which avoids this.
# Locally, accept common "no auth" codes.
accept = "100..=399"


## Additional excludes for pre-publish state
exclude = [
  # docs.rs pages for crates that are not yet published
  "https://docs\\.rs/.*",
  # crates.io pages for crates that are not yet published
  "https://crates\\.io/crates/.*",
  # GitHub Pages site may be offline during PRs
  "https://secbear\\.github\\.io/neuron",
]
